services:
  openclaw-gateway:
    container_name: openclaw-gateway
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: "root"
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ~/.ssh:/root/.ssh
      - ~/.ssh:/home/node/.ssh
      - ~/.gitconfig:/root/.gitconfig
      - ~/.gitconfig:/home/node/.gitconfig
      - ./secret_file.json:/tmp/secret_file.json:ro
      - ./start-gateway.sh:/usr/local/bin/start-gateway.sh:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    cap_add:
      - SYS_ADMIN
    init: true
    restart: unless-stopped
    command: ["sh", "/usr/local/bin/start-gateway.sh"]

x-podman:
  in_pod: false

services:
  coder-copilot:
    container_name: coder-copilot
    image: ${CODER_COPILOT_IMAGE:-coder-copilot:latest}
    user: "root"
    environment:
      OPENCLAW_PUB_KEY: ${OPENCLAW_PUB_KEY:-}
    volumes:
      - ${CODER_HARNESS_CONFIG_DIR}:/root/.copilot
      - ./secrets/copilot-secrets.kdbx:/root/.vault/vault.kdbx:ro
      - ./secrets/copilot-secrets.pass:/root/.vault/key.pass:ro
      - ./output/projects:/output/projects
      - ./create_ssh_user.sh:/create_ssh_user.sh:ro
    init: true
    restart: unless-stopped
    networks:
      - openclaw-internal

  openclaw-exec-node:
    container_name: openclaw-exec-node
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: "node"
    environment:
      HOME: /home/node
      OPENCLAW_GATEWAY_TLS_FINGERPRINT: ${OPENCLAW_GATEWAY_TLS_FINGERPRINT:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-debug}
    volumes:
      - ${EXEC_NODE_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_CONFIG_DIR}/.ssh:/home/node/.ssh
      - apt_archives:/var/cache/apt/archives/
      - npm_archives:/home/node/.npm
      - ./exec_node_entry.sh:/usr/local/bin/exec_node_entry.sh:ro
      - ./output:/output
      - ./workspaces:/workspaces
    init: true
    depends_on:
      openclaw-gateway:
        condition: service_started
    command: ["/usr/local/bin/exec_node_entry.sh"]
    networks:
      openclaw-internal:
        ipv4_address: 172.30.0.10

  openclaw-gateway:
    container_name: openclaw-gateway
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    shm_size: '1gb'
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: "node"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_AGENT_DIR: ${OPENCLAW_AGENT_DIR:-}
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-debug}
      PI_CODING_AGENT_DIR: ${PI_CODING_AGENT_DIR:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      AGENT_WORKSPACE_ROOT: ${AGENT_WORKSPACE_ROOT:-}
      BUNDLED_PLUGINS_TO_INSTALL: ${BUNDLED_PLUGINS_TO_INSTALL:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_CONFIG_DIR}/.ssh:/home/node/.ssh
      - ${OPENCLAW_CONFIG_DIR}/.gitconfig:/home/node/.gitconfig
      - ./start-gateway.sh:/usr/local/bin/start-gateway.sh:ro
      - ./coder_acp_cmd.sh:/usr/local/bin/coder_acp_cmd.sh:ro
      - ./keepassxc-vault.sh:/usr/local/bin/keepassxc-vault.sh:ro
      - ./secrets/openclaw-secrets.kdbx:/run/openclaw-secrets/openclaw-secrets.kdbx:ro
      - ./secrets/openclaw-secrets.pass:/run/openclaw-secrets/openclaw-secrets.pass:ro
      - ./myextensions:/home/node/.openclaw/extensions
      - ./output:/output
      - ./workspaces:/workspaces
      - apt_archives:/var/cache/apt/archives/
      - npm_archives:/home/node/.npm
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    depends_on:
      coder-copilot:
        condition: service_started
    entrypoint: ["/usr/local/bin/start-gateway.sh"]
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    networks:
      - local-llm-service
      - openclaw-internal
      
networks:
  local-llm-service:
    external: true
  openclaw-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  apt_archives:
  npm_archives:
